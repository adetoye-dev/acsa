name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: acsa-core-linux-x86_64.tar.gz
            archive: tar.gz
            builder: cargo
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: acsa-core-linux-aarch64.tar.gz
            archive: tar.gz
            builder: cross
          - os: macos-13
            target: x86_64-apple-darwin
            asset: acsa-core-darwin-x86_64.tar.gz
            archive: tar.gz
            builder: cargo
          - os: macos-14
            target: aarch64-apple-darwin
            asset: acsa-core-darwin-aarch64.tar.gz
            archive: tar.gz
            builder: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: acsa-core-windows-x86_64.zip
            archive: zip
            builder: cargo
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.builder == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.builder }}" == "cross" ]]; then
            cross build --release --locked -p acsa-core --target ${{ matrix.target }}
          else
            cargo build --release --locked -p acsa-core --target ${{ matrix.target }}
          fi

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/acsa-core dist/acsa-core
          tar -czf dist/${{ matrix.asset }} -C dist acsa-core

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target/${{ matrix.target }}/release/acsa-core.exe dist/acsa-core.exe
          Compress-Archive -Path dist/acsa-core.exe -DestinationPath dist/${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: acsa-${{ matrix.target }}
          path: dist/*

  build-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: acsa-ui-standalone
          path: |
            ui/.next/standalone
            ui/.next/static
            ui/public

  checksums:
    needs:
      - build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: |
          cd dist && find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > ../SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: acsa-checksums
          path: SHA256SUMS

  container-image:
    runs-on: ubuntu-latest
    needs:
      - build-ui
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/acsa
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
