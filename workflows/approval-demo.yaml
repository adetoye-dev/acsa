version: v1
name: approval-demo
trigger:
  type: manual
steps:
  - id: seed
    type: constant
    params:
      value:
        request_id: REQ-1001
        summary: Release staging build
    next: [manager_approval]
    timeout_ms: 1000
  - id: manager_approval
    type: approval
    params:
      prompt: Approve the staging deployment?
      details:
        team: platform
    next: [finish]
    timeout_ms: 86400000
  - id: finish
    type: noop
    params:
      label: deployment approved
    next: []
    timeout_ms: 1000
