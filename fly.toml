# fly.toml configuration for ACSA Rust Backend Engine (acsa-core)
# Secure a free persistent SQLite storage volume on Fly.io

app = "acsa-engine"
primary_region = "bos"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "acsa_data"
  destination = "/data"

[env]
  PORT = "8080"
  ACSA_WORKFLOWS_DIR = "workflows"
  ACSA_DB_PATH = "/data/acsa.db"
