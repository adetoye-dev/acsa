services:
  acsa:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
    environment:
      ACSA_WEBHOOK_SECRET: change-me
      ACSA_DB_PATH: /app/data/acsa.db
      ACSA_WORKFLOWS_DIR: /app/workflows
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ../workflows:/app/workflows
      - acsa-data:/app/data

volumes:
  acsa-data:
