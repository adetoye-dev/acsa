# cargo-audit configuration file for ACSA
# Ignore transitive wasmtime vulnerabilities inherited via the extism dependency
# until a newer release of extism is available with updated wasmtime.

[advisories]
ignore = [
    "RUSTSEC-2026-0086", # Host data leakage with 64-bit tables and Winch
    "RUSTSEC-2026-0096", # Miscompiled guest heap access enables sandbox escape on aarch64 Cranelift
    "RUSTSEC-2026-0092", # Panic when transcoding misaligned component model UTF-16 strings
    "RUSTSEC-2026-0114", # Panic when allocating a table exceeding the size of the host's address space
    "RUSTSEC-2026-0093", # Heap OOB read in component model UTF-16 to latin1+utf16 string transcoding
    "RUSTSEC-2026-0087", # Wasmtime segfault or unused out-of-sandbox load with `f64x2.splat` operator on Cranelift x86-64
    "RUSTSEC-2026-0088", # Data leakage between pooling allocator instances
    "RUSTSEC-2026-0089", # Host panic when Winch compiler executes `table.fill`
    "RUSTSEC-2026-0094", # Improperly masked return value from `table.grow` with Winch compiler backend
    "RUSTSEC-2026-0085", # Panic when lifting `flags` component value
    "RUSTSEC-2026-0095", # Wasmtime with Winch compiler backend may allow a sandbox-escaping memory access
    "RUSTSEC-2026-0091", # Out-of-bounds write or crash when transcoding component model strings
]
